name: Deploy VetCard to Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: vetcard-ph-prod
  AZURE_CLIENT_ID: 77afa360-bb04-4bdf-bec0-491f242d8ee5
  AZURE_TENANT_ID: a903f77c-d96c-471c-9411-ed043ee10aa4
  AZURE_SUBSCRIPTION_ID: 243d62a4-9c42-47b6-81e4-d9f18457b2da
  NODE_VERSION: 22.x

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend and web app
        run: npm run build

      - name: Create Azure runtime package
        run: |
          mkdir -p runtime/backend runtime/web runtime/uploads
          cp -R backend/dist backend/prisma runtime/backend/
          cp -R web/dist runtime/web/

          node <<'NODE'
          const fs = require('node:fs')
          const backend = require('./backend/package.json')
          const root = require('./package.json')
          const pkg = {
            name: 'vetcard-runtime',
            version: root.version || '1.0.0',
            private: true,
            type: 'commonjs',
            scripts: { start: 'node backend/dist/index.js' },
            engines: root.engines || { node: '>=22 <25' },
            dependencies: backend.dependencies,
            devDependencies: { prisma: backend.devDependencies.prisma },
            prisma: { schema: 'backend/prisma/schema.prisma' },
          }
          fs.writeFileSync('runtime/package.json', JSON.stringify(pkg, null, 2))
          NODE

          cd runtime
          npm install --include=optional
          npx prisma generate --schema backend/prisma/schema.prisma
          npm prune --omit=dev --include=optional
          mv node_modules app_node_modules
          zip -qr ../vetcard-runtime.zip .

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: vetcard-runtime.zip

      - name: Restart Azure App Service
        run: az webapp restart --name "$AZURE_WEBAPP_NAME" --resource-group vetcard-prod-rg
