services:
  postgres:
    image: postgres:16-alpine
    container_name: vetcard-postgres
    environment:
      POSTGRES_DB: vetcard
      POSTGRES_USER: vetcard
      POSTGRES_PASSWORD: vetcard
    ports:
      - "5433:5432"
    volumes:
      - vetcard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetcard -d vetcard"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  vetcard-postgres-data:
